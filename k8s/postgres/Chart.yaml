apiVersion: v2
name: postgres
description: PostgreSQL database for UpToYouShop on EKS
type: application
version: 0.1.0
appVersion: "15.4"

# Chart dependencies
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

# Chart metadata
home: https://www.postgresql.org/
sources:
  - https://github.com/bitnami/charts/tree/main/bitnami/postgresql
  - https://github.com/postgres/postgres

maintainers:
  - name: UpToYouShop Team
    email: dev@uptoyoushop.com

# Annotations for EKS integration
annotations:
  helm.sh/resource-policy: keep
  eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT:role/postgres-role"

# Chart configuration
kubeVersion: ">=1.24.0-0"
keywords:
  - postgresql
  - database
  - sql
  - eks
  - aws

# Icon
icon: https://raw.githubusercontent.com/postgres/postgres/master/src/backend/utils/misc/postgres_logo.png
