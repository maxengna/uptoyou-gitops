apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptoyoushop-postgresql
  labels:
    app: uptoyoushop
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptoyoushop-postgresql
  template:
    metadata:
      labels:
        app: uptoyoushop-postgresql
    spec:
      containers:
        - name: uptoyoushop-postgresql
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              value: "mypassword"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: uptoyoushop-postgresql-pvc
